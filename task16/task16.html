<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f4f4f4;
        }

        form {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        table {
            margin-top: 30px;
            border-collapse: collapse;
            width: 600px;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>
<body>

    <h2>Add Student</h2>

    <form id="studentForm">
        <input type="text" id="name" placeholder="Student Name">
        <p id="messageName"></p>
        <input type="number" id="age" placeholder="Age">
        <p id="messageAge" ></p>
        <input type="number" id="score" placeholder="Score (0-100)">
        <p id="messageScore"></p>
        <button type="submit">Save Student</button>
        <p id="message"></p>
    </form>
    <p id="pEstudiante"></p>
    <h2>Saved Data: </h2>

    <p id="info">
        
    </p>

    <script src="task16.js"></script>

</body>
</html>
